name: Deploy to GitHub Pages

on:
    push:
        branches: [master, feature/new-site]
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci
            - run: npm run build
              env:
                  SIGN_UP_OPENED: ${{ vars.SIGN_UP_OPENED }}

            - uses: actions/configure-pages@v6

            - uses: actions/upload-pages-artifact@v5
              with:
                  path: dist

            - uses: actions/deploy-pages@v5
              id: deployment
